<!DOCTYPE html>
<html>
<head>
    <title>CTI Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:black;color:white;">

<div class="card bg-secondary text-light p-4">

    <h1 class="text-center mb-4">🔐 Cyber Threat Intelligence Dashboard</h1>

    <!-- Input Form -->
    <form method="POST" action="/check" class="text-center mb-4">
        <input type="text" name="ip" placeholder="Enter IP address" class="form-control w-50 d-inline">
        <button type="submit" class="btn btn-primary">Check</button>
    </form>

    {% if ip %}
    <!-- Results Card -->
    <div class="card bg-secondary text-light p-4">

        <h3>Results for: {{ ip }}</h3>

        <div class="row text-center mt-3">
            <div class="col">
                <h5 class="text-danger">Malicious</h5>
                <h3>{{ malicious }}</h3>
            </div>

            <div class="col">
                <h5 class="text-warning">Suspicious</h5>
                <h3>{{ suspicious }}</h3>
            </div>

            <div class="col">
                <h5 class="text-success">Harmless</h5>
                <h3>{{ harmless }}</h3>
            </div>
        </div>

        <hr>

        <!-- Threat Level -->
        <h2 class="text-center 
            {% if threat == 'HIGH' %}text-danger
            {% elif threat == 'MEDIUM' %}text-warning
            {% else %}text-success
            {% endif %}
        ">
            Threat Level: {{ threat }}
        </h2>

    </div>
    {% endif %}

</div>

</body>
</html>
